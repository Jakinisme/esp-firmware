; ============================================================
;  PlatformIO Configuration — ESP32 + DSHOT300
;  Protocol  : DSHOT300  (digital ESC protocol, 300 kbps)
;  Hardware  : ESP32 DevKit (240 MHz dual-core)
;  Driver    : ESP32-DSHOT-RMT (uses RMT peripheral)
;  Author    : Jaki
; ============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ---------- Build flags ----------
build_flags =
    -DCORE_DEBUG_LEVEL=0        ; 0=none … 5=verbose (set 3 saat debug)
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_ESP32_DEV
    -I src                      ; resolve "header/..." and "lib/..." includes

; ---------- Upload & Monitor ----------
monitor_speed   = 115200
upload_speed    = 921600

; ---------- DSHOT Library ----------
; Paket: ESP32-DSHOT-RMT
; Repo : https://github.com/derdoktor667/ESP32-DSHOT-RMT
; Gunakan RMT peripheral ESP32 → timing presisi, tidak perlu delay()
lib_deps =
    derdoktor667/DShotRMT

